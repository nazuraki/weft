openapi: "3.0.0"
info:
  title: Project API
  version: "1.0.0"
paths:
  /users:
    get:
      operationId: listUsers
      summary: List all users
    post:
      operationId: createUser
      summary: Create a new user
  /users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
